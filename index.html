<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Thole Solutions</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --paper: #F6F7FB;
      --card: rgba(255,255,255,0.75);
      --card-solid: #FFFFFF;
      --ink: #14162E;
      --ink-soft: #565B78;
      --ink-faint: #8B8FA8;
      --line: #E1E3EE;
      --accent: #1D1F91;
      --accent-dark: #14166B;
      --accent-soft: #E7E8F7;
      --sky: #5CACF7;
      --amber: #9C6B1F;
      --danger: #A6432C;
      --danger-soft: #F4E6E1;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--paper); color: var(--ink);
      display: flex; min-height: 100vh;
    }
    .sidebar {
      width: 240px; background: var(--card); backdrop-filter: blur(10px);
      border-right: 1px solid var(--line); position: sticky; top: 0; height: 100vh;
      display: flex; flex-direction: column; flex-shrink: 0; z-index: 10;
    }
    .sidebar-header { padding: 1.5rem 1rem; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 0.75rem; }
    .sidebar-header img { width: 36px; height: 36px; border-radius: 8px; }
    .sidebar-header .biz { font-weight: 600; font-size: 0.95rem; }
    .sidebar-header .biz-type { font-size: 0.7rem; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.05em; }
    .nav { flex: 1; padding: 0.75rem; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.8rem; border-radius: 8px;
      font-size: 0.9rem; color: var(--ink-soft); cursor: pointer; transition: background 0.2s;
    }
    .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--ink); }
    .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
    .sidebar-footer { padding: 1rem; border-top: 1px solid var(--line); font-size: 0.8rem; }
    .sidebar-footer .logout { color: var(--danger); cursor: pointer; }
    main { flex: 1; padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; width: 100%; overflow-y: auto; }
    .page { display: none; }
    .page.active { display: block; }
    .page-header { margin-bottom: 1.5rem; }
    .page-header h2 { font-size: 1.6rem; font-weight: 600; }
    .metrics {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .metric-card {
      background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .metric-card .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faint); margin-bottom: 0.3rem; }
    .metric-card .value { font-size: 1.6rem; font-weight: 600; }
    .card {
      background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 1rem; margin-bottom: 1rem;
    }
    .btn {
      padding: 0.5rem 1rem; border: none; border-radius: 6px; background: var(--accent); color: white;
      font-weight: 500; cursor: pointer; font-size: 0.85rem;
    }
    .btn:hover { background: var(--accent-dark); }
    .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--ink-soft); }
    .btn-danger { background: var(--danger); }
    .btn-small { padding: 0.35rem 0.75rem; font-size: 0.75rem; }
    input, select, textarea {
      padding: 0.5rem 0.75rem; border: 1px solid var(--line); border-radius: 6px;
      background: white; font-size: 0.9rem; width: 100%; margin-bottom: 0.5rem;
    }
    label { font-size: 0.8rem; color: var(--ink-soft); display: block; margin-bottom: 0.2rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid var(--line); }
    th { color: var(--ink-faint); text-transform: uppercase; font-size: 0.7rem; }
    .badge {
      display: inline-block; padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.7rem;
      background: var(--accent-soft); color: var(--accent);
    }
    .badge.danger { background: var(--danger-soft); color: var(--danger); }
    .badge.warning { background: #FFF3E0; color: #E65100; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex;
      align-items: center; justify-content: center; z-index: 50;
    }
    .modal {
      background: var(--paper); border-radius: 12px; padding: 1.5rem; width: 90%;
      max-width: 500px; max-height: 85vh; overflow-y: auto;
    }
    .bottom-nav { display: none; }
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { display: none; }
      main { padding: 1rem 1rem 5rem; }
      .bottom-nav {
        display: flex; position: fixed; bottom: 0; left: 0; right: 0;
        background: var(--card); backdrop-filter: blur(10px);
        border-top: 1px solid var(--line); z-index: 20; justify-content: space-around; padding: 0.4rem 0;
      }
      .bottom-nav .nav-item { flex-direction: column; font-size: 0.65rem; gap: 0.2rem; padding: 0.3rem; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  // CONFIG
  const SUPABASE_URL = "https://qehgsomtcionbovlqgyi.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlaGdzb210Y2lvbmJvdmxxZ3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2ODA4ODQsImV4cCI6MjA5OTI1Njg4NH0.QydTydc8wbbhRhwiNpWCqA74m52MZ3RcgKJOmf538us";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let session = null, membership = null, businessId = null, userRole = null, activePage = 'dashboard';
  let state = {
    products: [], customers: [], suppliers: [], rawMaterials: [], recipes: [],
    orders: [], payments: [], expenses: [], purchaseOrders: [], users: [],
    cart: []
  };
  let editingId = null; // for modal edit mode

  // HELPERS
  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);
  const esc = (s) => { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; };
  const fmoney = (n) => Number(n ?? 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  async function boot() {
    const { data: { session: s } } = await sb.auth.getSession();
    if (!s) return showAuth();
    session = s;
    await loadMembership();
  }
  async function loadMembership() {
    const { data, error } = await sb
      .from('app_users').select('business_id, role, full_name, businesses(name, business_types(display_name))')
      .eq('user_id', session.user.id).maybeSingle();
    if (error || !data) return showOnboarding();
    membership = data; businessId = data.business_id; userRole = data.role;
    renderApp();
  }
    // ========== AUTH & ONBOARDING ==========
  function showAuth() {
    document.getElementById('app').innerHTML = `
      <div style="max-width:400px;margin:auto;padding:3rem 1rem;">
        <h1>Thole Solutions</h1>
        <div id="login-form">
          <input id="login-email" placeholder="Email" />
          <input id="login-password" type="password" placeholder="Password" />
          <button class="btn" onclick="doLogin()">Sign in</button>
          <p style="margin-top:1rem;">New? <a onclick="toggleAuth()">Redeem invite code</a></p>
        </div>
        <div id="signup-form" style="display:none;">
          <input id="signup-name" placeholder="Full name" />
          <input id="signup-code" placeholder="Invite code" />
          <input id="signup-email" placeholder="Email" />
          <input id="signup-password" type="password" placeholder="Password" />
          <button class="btn" onclick="doSignup()">Create account</button>
          <p style="margin-top:1rem;"><a onclick="toggleAuth()">Back to sign in</a></p>
        </div>
        <div id="auth-error" style="color:red;margin-top:1rem;"></div>
      </div>`;
  }
  window.toggleAuth = () => {
    document.getElementById('login-form').style.display = document.getElementById('login-form').style.display === 'none' ? '' : 'none';
    document.getElementById('signup-form').style.display = document.getElementById('signup-form').style.display === 'none' ? '' : 'none';
    document.getElementById('auth-error').innerText = '';
  };
  window.doLogin = async () => {
    const { data, error } = await sb.auth.signInWithPassword({
      email: document.getElementById('login-email').value,
      password: document.getElementById('login-password').value
    });
    if (error) return document.getElementById('auth-error').innerText = error.message;
    session = data.session; loadMembership();
  };
  window.doSignup = async () => {
    const name = document.getElementById('signup-name').value, code = document.getElementById('signup-code').value;
    const { data, error } = await sb.auth.signUp({
      email: document.getElementById('signup-email').value,
      password: document.getElementById('signup-password').value
    });
    if (error) return document.getElementById('auth-error').innerText = error.message;
    session = data.session;
    const { error: rpcErr } = await sb.rpc('redeem_invite_code', { p_invite_code: code, p_full_name: name });
    if (rpcErr) return document.getElementById('auth-error').innerText = rpcErr.message;
    loadMembership();
  };
  function showOnboarding() {
    document.getElementById('app').innerHTML = `
      <div style="max-width:400px;margin:auto;padding:3rem 1rem;">
        <h1>Join your business</h1>
        <input id="ob-name" placeholder="Your name" />
        <input id="ob-code" placeholder="Invite code" />
        <button class="btn" onclick="doRedeem()">Join</button>
        <div id="ob-error" style="color:red;"></div>
      </div>`;
  }
  window.doRedeem = async () => {
    const { error } = await sb.rpc('redeem_invite_code', {
      p_invite_code: document.getElementById('ob-code').value,
      p_full_name: document.getElementById('ob-name').value
    });
    if (error) return document.getElementById('ob-error').innerText = error.message;
    loadMembership();
  };
  window.logout = async () => { await sb.auth.signOut(); location.reload(); };

  // ========== APP SHELL ==========
  function renderApp() {
    document.getElementById('app').innerHTML = `
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><img src="logo.png"/><div><div class="biz">${esc(membership.businesses.name)}</div><div class="biz-type">${esc(membership.businesses.business_types?.display_name || '')}</div></div></div>
        <div class="nav" id="desktop-nav"></div>
        <div class="sidebar-footer"><div>${esc(membership.full_name || session.user.email)}</div><div class="logout" onclick="logout()">Sign out</div></div>
      </div>
      <main id="main-content"></main>
      <div class="bottom-nav" id="bottom-nav"></div>`;
    buildNav();
    loadAllData().then(() => switchPage('dashboard'));
  }
  function buildNav() {
    const items = [
      { page:'dashboard', icon:'📊', label:'Dashboard' },
      { page:'products', icon:'📦', label:'Products' },
      { page:'sales', icon:'🛒', label:'Sales' },
      { page:'customers', icon:'👥', label:'Customers' },
      { page:'suppliers', icon:'🚚', label:'Suppliers' },
      { page:'purchase', icon:'📋', label:'Purchases' },
      { page:'inventory', icon:'🧪', label:'Raw Materials' },
      { page:'production', icon:'⚙️', label:'Production' },
      { page:'payments', icon:'💳', label:'Payments' },
      { page:'expenses', icon:'💰', label:'Expenses' },
      { page:'users', icon:'👤', label:'Users', role:'owner' }
    ].filter(i => !i.role || userRole === i.role);
    const navHtml = items.map(i => `<div class="nav-item" data-page="${i.page}" onclick="switchPage('${i.page}')"><span>${i.icon}</span>${i.label}</div>`).join('');
    document.getElementById('desktop-nav').innerHTML = navHtml;
    document.getElementById('bottom-nav').innerHTML = items.slice(0,5).map(i => `<div class="nav-item" data-page="${i.page}" onclick="switchPage('${i.page}')"><span>${i.icon}</span>${i.label}</div>`).join('');
  }
  window.switchPage = (page) => {
    activePage = page;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
    renderPage(page);
  };
  async function loadAllData() {
    const res = await Promise.all([
      sb.from('products').select('*').eq('is_active',true).order('name'),
      sb.from('customers').select('*').order('name'),
      sb.from('suppliers').select('*').order('name'),
      sb.from('raw_materials').select('*').order('name'),
      sb.from('recipe_items').select('*, raw_materials(*), products(*)'),
      sb.from('orders').select('*, customers(name)').order('created_at',{ascending:false}).limit(100),
      sb.from('payments').select('*, customers(name), suppliers(name)').order('created_at',{ascending:false}).limit(100),
      sb.from('expenses').select('*').order('expense_date',{ascending:false}).limit(100),
      sb.from('purchase_orders').select('*, suppliers(name)').order('created_at',{ascending:false}).limit(50),
      sb.from('app_users').select('*').eq('business_id',businessId)
    ]);
    state.products = res[0].data || []; state.customers = res[1].data || [];
    state.suppliers = res[2].data || []; state.rawMaterials = res[3].data || [];
    state.recipes = res[4].data || []; state.orders = res[5].data || [];
    state.payments = res[6].data || []; state.expenses = res[7].data || [];
    state.purchaseOrders = res[8].data || []; state.users = res[9].data || [];
  }
  function renderPage(page) {
    const main = document.getElementById('main-content');
    main.innerHTML = `<div class="page active" id="page-${page}"></div>`;
    const container = document.getElementById(`page-${page}`);
    switch(page) {
      case 'dashboard': renderDashboard(container); break;
      case 'products': renderProducts(container); break;
      case 'sales': renderSales(container); break;
      case 'customers': renderCustomers(container); break;
      case 'suppliers': renderSuppliers(container); break;
      case 'purchase': renderPurchaseOrders(container); break;
      case 'inventory': renderRawMaterials(container); break;
      case 'production': renderProduction(container); break;
      case 'payments': renderPayments(container); break;
      case 'expenses': renderExpenses(container); break;
      case 'users': renderUsers(container); break;
    }
  }

  // ========== DASHBOARD ==========
  function renderDashboard(container) {
    const today = new Date().toISOString().slice(0,10);
    const month = new Date().toISOString().slice(0,7);
    const revToday = state.orders.filter(o => o.created_at.startsWith(today)).reduce((s,o)=>s+Number(o.total_amount),0);
    const revMonth = state.orders.filter(o => o.created_at.startsWith(month)).reduce((s,o)=>s+Number(o.total_amount),0);
    const expMonth = state.expenses.filter(e => e.expense_date.startsWith(month)).reduce((s,e)=>s+Number(e.amount),0);
    const profit = revMonth - expMonth;
    const lowStock = state.products.filter(p => p.stock_qty!=null && p.low_stock_threshold!=null && p.stock_qty<=p.low_stock_threshold).length;
    const invValue = state.products.reduce((s,p)=>s+(Number(p.price)*(Number(p.stock_qty)||0)),0);
    container.innerHTML = `
      <div class="page-header"><h2>Dashboard</h2></div>
      <div class="metrics">
        <div class="metric-card"><div class="label">Revenue Today</div><div class="value">${fmoney(revToday)}</div></div>
        <div class="metric-card"><div class="label">Revenue This Month</div><div class="value">${fmoney(revMonth)}</div></div>
        <div class="metric-card"><div class="label">Expenses This Month</div><div class="value">${fmoney(expMonth)}</div></div>
        <div class="metric-card"><div class="label">Profit This Month</div><div class="value">${fmoney(profit)}</div></div>
        <div class="metric-card"><div class="label">Low Stock</div><div class="value" style="color:var(--danger)">${lowStock}</div></div>
        <div class="metric-card"><div class="label">Inventory Value</div><div class="value">${fmoney(invValue)}</div></div>
      </div>
      <div class="grid-2">
        <div class="card"><canvas id="salesChart" height="200"></canvas></div>
        <div class="card"><canvas id="topProductsChart" height="200"></canvas></div>
      </div>`;
    setTimeout(() => {
      const ctx = document.getElementById('salesChart')?.getContext('2d');
      if(ctx) {
        const days=[], data=[];
        for(let i=6;i>=0;i--) {
          const d = new Date(); d.setDate(d.getDate()-i);
          const day = d.toISOString().slice(0,10);
          days.push(d.toLocaleDateString('en',{weekday:'short'}));
          data.push(state.orders.filter(o=>o.created_at.startsWith(day)).reduce((s,o)=>s+Number(o.total_amount),0));
        }
        new Chart(ctx, {type:'bar', data:{labels:days, datasets:[{label:'Revenue',data}]}});
      }
      // Top products from order_items (requires separate query – simplified)
      const ctx2 = document.getElementById('topProductsChart')?.getContext('2d');
      if(ctx2) new Chart(ctx2, {type:'doughnut', data:{labels:['Product A','Other'], datasets:[{data:[1,1]}]}});
    },100);
  }

  // ========== PRODUCTS (with search, add/edit/delete, stock history) ==========
  function renderProducts(container) {
    const cats = [...new Set(state.products.map(p=>p.category).filter(Boolean))];
    container.innerHTML = `
      <div class="page-header"><h2>Products</h2></div>
      <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
        <input id="prod-search" placeholder="Search products..." oninput="renderProductList()" style="max-width:300px" />
        <select id="cat-filter" onchange="renderProductList()"><option value="">All categories</option>${cats.map(c=>`<option>${esc(c)}</option>`).join('')}</select>
        ${userRole!=='staff' ? `<button class="btn" onclick="openProductModal()">+ Add</button>` : ''}
      </div>
      <div id="product-list" class="grid-2" style="grid-template-columns: repeat(auto-fill, minmax(200px,1fr));"></div>
      <div id="stock-history-modal" class="modal-overlay hidden"><div class="modal"><h3>Stock History</h3><div id="history-content"></div><button class="btn" onclick="closeModal('stock-history-modal')">Close</button></div></div>`;
    window.renderProductList = () => {
      const q = document.getElementById('prod-search').value.toLowerCase();
      const cat = document.getElementById('cat-filter').value;
      const filtered = state.products.filter(p => (cat==='' || p.category===cat) && p.name.toLowerCase().includes(q));
      document.getElementById('product-list').innerHTML = filtered.map(p => `
        <div class="card" style="padding:0.75rem;">
          <div style="font-weight:600;">${esc(p.name)}</div>
          <div style="font-size:0.8rem;color:var(--ink-faint);">${esc(p.category||'')}</div>
          <div>Price: ${fmoney(p.price)}</div>
          <div>Stock: ${p.stock_qty ?? '—'} ${esc(p.unit)}</div>
          ${p.low_stock_threshold && p.stock_qty <= p.low_stock_threshold ? '<span class="badge danger">Low stock</span>' : ''}
          <div style="margin-top:0.5rem; display:flex; gap:0.3rem;">
            ${userRole!=='staff' ? `<button class="btn-small" onclick="openProductModal('${p.id}')">Edit</button><button class="btn-small btn-danger" onclick="deleteProduct('${p.id}')">Del</button>` : ''}
            <button class="btn-small btn-ghost" onclick="showStockHistory('${p.id}')">History</button>
          </div>
        </div>`).join('');
    };
    renderProductList();
  }
  window.openProductModal = (id=null) => {
    editingId = id;
    const p = id ? state.products.find(x=>x.id===id) : null;
    const modalHtml = `
      <div class="modal-overlay" id="prod-modal"><div class="modal">
        <h3>${id?'Edit':'Add'} Product</h3>
        <input id="p-name" value="${esc(p?.name||'')}" placeholder="Name" />
        <input id="p-category" value="${esc(p?.category||'')}" list="cat-list" placeholder="Category" />
        <datalist id="cat-list">${[...new Set(state.products.map(x=>x.category).filter(Boolean))].map(c=>`<option>${esc(c)}</option>`).join('')}</datalist>
        <div class="grid-2"><div><label>Price</label><input id="p-price" type="number" value="${p?.price||''}" /></div><div><label>Unit</label><input id="p-unit" value="${esc(p?.unit||'item')}" /></div></div>
        <div class="grid-2"><div><label>Stock</label><input id="p-stock" type="number" value="${p?.stock_qty??''}" /></div><div><label>Low threshold</label><input id="p-threshold" type="number" value="${p?.low_stock_threshold??''}" /></div></div>
        <div style="margin-top:1rem; display:flex; gap:0.5rem;">
          <button class="btn" onclick="saveProduct()">Save</button>
          <button class="btn-ghost" onclick="closeModal('prod-modal')">Cancel</button>
        </div>
      </div></div>`;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
  };
  window.saveProduct = async () => {
    const payload = {
      name: document.getElementById('p-name').value,
      category: document.getElementById('p-category').value || null,
      price: parseFloat(document.getElementById('p-price').value),
      unit: document.getElementById('p-unit').value || 'item',
      stock_qty: document.getElementById('p-stock').value === '' ? null : parseFloat(document.getElementById('p-stock').value),
      low_stock_threshold: document.getElementById('p-threshold').value === '' ? null : parseFloat(document.getElementById('p-threshold').value)
    };
    if (editingId) await sb.from('products').update(payload).eq('id',editingId);
    else await sb.from('products').insert({ business_id: businessId, ...payload });
    closeModal('prod-modal'); await loadAllData(); renderPage('products');
  };
  window.deleteProduct = async (id) => { if(confirm('Delete?')) { await sb.from('products').update({is_active:false}).eq('id',id); await loadAllData(); renderPage('products'); } };
  window.showStockHistory = async (productId) => {
    const { data } = await sb.from('stock_movements').select('*').eq('product_id',productId).order('created_at',{ascending:false}).limit(20);
    const history = data || [];
    document.getElementById('history-content').innerHTML = history.length ? `<ul>${history.map(h=>`<li>${h.quantity_change} — ${h.reason} (${new Date(h.created_at).toLocaleString()})</li>`).join('')}</ul>` : 'No history';
    document.getElementById('stock-history-modal').classList.remove('hidden');
  };

  // ========== SALES (POS cart) ==========
  function renderSales(container) {
    container.innerHTML = `
      <div class="page-header"><h2>Sales</h2></div>
      <div class="grid-2">
        <div class="card">
          <h3>Products</h3>
          <input id="sale-search" placeholder="Search product..." oninput="renderSaleProducts()" />
          <div id="sale-product-list" style="max-height:400px;overflow-y:auto;"></div>
        </div>
        <div class="card">
          <h3>Cart</h3>
          <div id="cart-items"></div>
          <div class="cart-summary">Total: <span id="cart-total">0.00</span></div>
          <select id="sale-customer"><option value="">Walk-in</option>${state.customers.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select>
          <select id="sale-method"><option value="cash">Cash</option><option value="mobile_money">Mobile Money</option></select>
          <button class="btn" onclick="completeSale()">Complete Sale</button>
        </div>
      </div>`;
    window.renderSaleProducts = () => {
      const q = document.getElementById('sale-search').value.toLowerCase();
      const html = state.products.filter(p=>p.name.toLowerCase().includes(q)).map(p=>`
        <div style="display:flex;justify-content:space-between;padding:0.3rem 0;">
          <span>${esc(p.name)} (${fmoney(p.price)})</span>
          <button class="btn-small" onclick="addToCart('${p.id}')">Add</button>
        </div>`).join('');
      document.getElementById('sale-product-list').innerHTML = html || 'No products';
    };
    window.addToCart = (productId) => {
      const existing = state.cart.find(i=>i.product_id===productId);
      if(existing) existing.qty++;
      else {
        const prod = state.products.find(p=>p.id===productId);
        state.cart.push({product_id:productId, name:prod.name, price:prod.price, qty:1});
      }
      renderCart();
    };
    window.renderCart = () => {
      document.getElementById('cart-items').innerHTML = state.cart.map((item,i)=>`
        <div class="cart-item">
          <span>${esc(item.name)} x${item.qty}</span>
          <span>${fmoney(item.price*item.qty)} <button class="btn-small btn-ghost" onclick="removeCartItem(${i})">x</button></span>
        </div>`).join('');
      document.getElementById('cart-total').innerText = fmoney(state.cart.reduce((s,i)=>s+i.price*i.qty,0));
    };
    window.removeCartItem = (i) => { state.cart.splice(i,1); renderCart(); };
    window.completeSale = async () => {
      if(state.cart.length===0) return alert('Cart empty');
      const total = state.cart.reduce((s,i)=>s+i.price*i.qty,0);
      const customerId = document.getElementById('sale-customer').value || null;
      const { data: order } = await sb.from('orders').insert({business_id:businessId, customer_id:customerId, status:'completed', total_amount:total, created_by:session.user.id}).select().single();
      for(const item of state.cart) {
        await sb.from('order_items').insert({order_id:order.id, product_id:item.product_id, quantity:item.qty, unit_price:item.price});
        // Stock deduction & movement are handled here (or via trigger if added)
        const prod = state.products.find(p=>p.id===item.product_id);
        if(prod && prod.stock_qty!==null) {
          await sb.from('products').update({stock_qty: prod.stock_qty - item.qty}).eq('id',item.product_id);
          await sb.from('stock_movements').insert({business_id:businessId, item_type:'product', product_id:item.product_id, quantity_change:-item.qty, reason:'sale', reference_type:'order', reference_id:order.id, created_by:session.user.id});
        }
      }
      state.cart = []; renderCart();
      await loadAllData(); renderPage('sales');
    };
    renderSaleProducts(); renderCart();
  }

  // ========== CUSTOMERS ==========
  function renderCustomers(container) {
    container.innerHTML = `
      <div class="page-header"><h2>Customers</h2><button class="btn" onclick="openCustomerModal()">+ Add</button></div>
      <table><thead><tr><th>Name</th><th>Phone</th><th>Balance</th><th></th></tr></thead>
      <tbody>${state.customers.map(c=>{
        const bal = (state.orders.filter(o=>o.customer_id===c.id).reduce((s,o)=>s+Number(o.total_amount),0)) - (state.payments.filter(p=>p.customer_id===c.id && p.direction==='in').reduce((s,p)=>s+Number(p.amount),0));
        return `<tr><td>${esc(c.name)}</td><td>${esc(c.phone||'—')}</td><td>${fmoney(bal)}</td><td><button class="btn-small" onclick="openCustomerModal('${c.id}')">Edit</button></td></tr>`;
      }).join('')}</tbody></table>`;
  }
  window.openCustomerModal = (id=null) => {
    editingId = id; const c = id ? state.customers.find(x=>x.id===id) : null;
    const modal = `<div class="modal-overlay" id="cust-modal"><div class="modal">
      <h3>${id?'Edit':'Add'} Customer</h3>
      <input id="c-name" value="${esc(c?.name||'')}" placeholder="Name" />
      <input id="c-phone" value="${esc(c?.phone||'')}" placeholder="Phone" />
      <button class="btn" onclick="saveCustomer()">Save</button>
      <button class="btn-ghost" onclick="closeModal('cust-modal')">Cancel</button>
    </div></div>`;
    document.body.insertAdjacentHTML('beforeend', modal);
  };
  window.saveCustomer = async () => {
    const payload = { name: document.getElementById('c-name').value, phone: document.getElementById('c-phone').value || null };
    if(editingId) await sb.from('customers').update(payload).eq('id',editingId);
    else await sb.from('customers').insert({business_id:businessId, ...payload});
    closeModal('cust-modal'); await loadAllData(); renderPage('customers');
  };

  // ========== SUPPLIERS ==========
  function renderSuppliers(container) {
    container.innerHTML = `
      <div class="page-header"><h2>Suppliers</h2><button class="btn" onclick="openSupplierModal()">+ Add</button></div>
      <table><thead><tr><th>Name</th><th>Phone</th><th></th></tr></thead>
      <tbody>${state.suppliers.map(s=>`<tr><td>${esc(s.name)}</td><td>${esc(s.phone||'—')}</td><td><button class="btn-small" onclick="openSupplierModal('${s.id}')">Edit</button></td></tr>`).join('')}</tbody></table>`;
  }
  window.openSupplierModal = (id=null) => { /* similar to customer modal */ };
  window.saveSupplier = async () => { /* ... */ };

  // ========== PURCHASE ORDERS ==========
  function renderPurchaseOrders(container) {
    container.innerHTML = `
      <div class="page-header"><h2>Purchase Orders</h2><button class="btn" onclick="openPOModal()">+ New PO</button></div>
      <table><thead><tr><th>Supplier</th><th>Status</th><th>Total</th><th>Date</th><th></th></tr></thead>
      <tbody>${state.purchaseOrders.map(po=>`<tr><td>${esc(po.suppliers?.name||'—')}</td><td><span class="badge">${esc(po.status)}</span></td><td>${fmoney(po.total_amount)}</td><td>${new Date(po.created_at).toLocaleDateString()}</td><td>${po.status==='received'?'':`<button class="btn-small" onclick="receivePO('${po.id}')">Receive</button>`}</td></tr>`).join('')}</tbody></table>`;
  }
  window.openPOModal = () => { /* form to select supplier, add items (product or raw material), save as draft/sent */ };
  window.receivePO = async (poId) => {
    await sb.from('purchase_orders').update({status:'received', received_at: new Date().toISOString()}).eq('id',poId);
    // Restock items (would loop through purchase_order_items and update stock, log movements)
    await loadAllData(); renderPage('purchase');
  };

  // ========== RAW MATERIALS ==========
  function renderRawMaterials(container) {
    container.innerHTML = `
      <div class="page-header"><h2>Raw Materials</h2><button class="btn" onclick="openRMModal()">+ Add</button></div>
      <table><thead><tr><th>Name</th><th>Stock</th><th>Unit</th><th></th></tr></thead>
      <tbody>${state.rawMaterials.map(rm=>`<tr><td>${esc(rm.name)}</td><td>${rm.stock_qty} ${esc(rm.unit)}</td><td>${fmoney(rm.cost_per_unit)}</td><td><button class="btn-small" onclick="openRMModal('${rm.id}')">Edit</button></td></tr>`).join('')}</tbody></table>`;
  }
  window.openRMModal = (id=null) => { /* similar to product modal */ };

  // ========== PRODUCTION ==========
  function renderProduction(container) {
    container.innerHTML = `
      <div class="page-header"><h2>Production</h2></div>
      <h3>Recipes</h3>
      <table><thead><tr><th>Product</th><th>Ingredients</th><th></th></tr></thead>
      <tbody>${state.recipes.map(r=>`<tr><td>${esc(r.products?.name)}</td><td>${r.raw_materials?.name} x${r.quantity_required}</td><td><button class="btn-small" onclick="produce('${r.product_id}')">Produce 1</button></td></tr>`).join('')}</tbody></table>`;
  }
  window.produce = async (productId) => {
    const recipeItems = state.recipes.filter(r=>r.product_id===productId);
    if(!recipeItems.length) return alert('No recipe');
    // Check raw material stock, deduct, increase product stock, log movements
    for(const item of recipeItems) {
      const rm = state.rawMaterials.find(r=>r.id===item.raw_material_id);
      if(!rm || rm.stock_qty < item.quantity_required) return alert('Insufficient raw materials');
    }
    for(const item of recipeItems) {
      await sb.from('raw_materials').update({stock_qty: state.rawMaterials.find(r=>r.id===item.raw_material_id).stock_qty - item.quantity_required}).eq('id',item.raw_material_id);
      await sb.from('stock_movements').insert({business_id:businessId, item_type:'raw_material', raw_material_id:item.raw_material_id, quantity_change:-item.quantity_required, reason:'production', created_by:session.user.id});
    }
    // Increase product stock
    const prod = state.products.find(p=>p.id===productId);
    if(prod) {
      await sb.from('products').update({stock_qty: (prod.stock_qty||0)+1}).eq('id',productId);
      await sb.from('stock_movements').insert({business_id:businessId, item_type:'product', product_id:productId, quantity_change:1, reason:'production', created_by:session.user.id});
    }
    await loadAllData(); renderPage('production');
  };

  // ========== PAYMENTS ==========
  function renderPayments(container) {
    container.innerHTML = `
      <div class="page-header"><h2>Payments</h2><button class="btn" onclick="openPaymentModal()">+ Record</button></div>
      <table><thead><tr><th>Customer</th><th>Amount</th><th>Method</th><th>Date</th></tr></thead>
      <tbody>${state.payments.filter(p=>p.direction==='in').map(p=>`<tr><td>${esc(p.customers?.name||'—')}</td><td>${fmoney(p.amount)}</td><td>${esc(p.method)}</td><td>${new Date(p.created_at).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>`;
  }
  window.openPaymentModal = () => { /* select customer, amount, method */ };

  // ========== EXPENSES ==========
  function renderExpenses(container) {
    container.innerHTML = `
      <div class="page-header"><h2>Expenses</h2><button class="btn" onclick="openExpenseModal()">+ Add</button></div>
      <table><thead><tr><th>Category</th><th>Description</th><th>Amount</th><th>Date</th></tr></thead>
      <tbody>${state.expenses.map(e=>`<tr><td><span class="badge">${esc(e.category)}</span></td><td>${esc(e.description||'')}</td><td>${fmoney(e.amount)}</td><td>${e.expense_date}</td></tr>`).join('')}</tbody></table>`;
  }
  window.openExpenseModal = () => { /* category, description, amount, date */ };

  // ========== USERS ==========
  function renderUsers(container) {
    container.innerHTML = `
      <div class="page-header"><h2>Users</h2></div>
      <p>Invite code: <strong>${esc(membership.businesses.invite_code)}</strong></p>
      <table><thead><tr><th>Name</th><th>Role</th><th>Active</th><th></th></tr></thead>
      <tbody>${state.users.map(u=>`<tr><td>${esc(u.full_name||'—')}</td><td>${esc(u.role)}</td><td>${u.is_active?'Yes':'No'}</td><td>${userRole==='owner'&&u.user_id!==session.user.id?`<select onchange="changeRole('${u.id}',this.value)"><option ${u.role==='staff'?'selected':''}>staff</option><option ${u.role==='manager'?'selected':''}>manager</option></select><button class="btn-small btn-danger" onclick="disableUser('${u.id}')">Disable</button>`:''}</td></tr>`).join('')}</tbody></table>`;
  }
  window.changeRole = async (userId, newRole) => { await sb.from('app_users').update({role:newRole}).eq('id',userId); loadAllData(); renderPage('users'); };
  window.disableUser = async (userId) => { await sb.from('app_users').update({is_active:false}).eq('id',userId); loadAllData(); renderPage('users'); };

  // ========== MODAL CLOSE ==========
  window.closeModal = (id) => {
    const modal = document.getElementById(id);
    if(modal) modal.remove();
  };

  boot();
</script>
</body>
</html>
